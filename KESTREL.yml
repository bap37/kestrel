param_names:
    SIM_c
    SIM_RV
    SIM_x1
    SIM_EBV
    STEP
    SCATTER


parameters_to_condition_on:
    ['c', 'mB', 'x1', 'zHD', 'cERR', 'mBERR', 'x1ERR', 'MU', 'HOST_LOGMASS', 'MURES']

sim_parameters:
    n_sim:   60_000 
    n_batch: 500
    simname: 'posteriors/sims.v5.MIX.h5'
    posteriorname: 'posteriors/posterior.v5.MIX.pt'

#Optional key; for use with run_nre.py. Otherwise leave as None
Models_Comparison:
    KESTREL_LOG.yml
    KESTREL_2COLOURS.yml

Data_File:
    "DES5YR.FITRES.gz"
Simbank_File:
    "SIM_BANK_SB.FITRES.gz"


