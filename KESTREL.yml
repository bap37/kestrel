#########################
# Dictionaries 
#########################

Functions:
    SIM_c:    DistGaussian  #The shape of this parameter.
    SIM_RV:   DistGaussian
    SIM_EBV:  DistExponential
    SIM_beta: DistGaussian
    SIM_x1:   DistGaussian_EVOL

Splits:
    SIM_RV:  ["Stepwise","HOST_LOGMASS", 10] #A list containing the split parameter and location
    SIM_EBV: ["Stepwise","HOST_LOGMASS", 10]
    STEP:    ["Stepwise", "HOST_LOGMASS", 10]
    SIM_x1:  ["Linear", "HOST_LOGMASS", None]

#If using higher-order functions such as DistLogistic, which require two parameters
#this dictionary tells the correlation parameter.
#ONLY works when/if calling 2-parameter functions. 
Correlations:
    SIM_c:    None
    SIM_RV:   None
    SIM_EBV:  None
    SIM_beta: None
    SIM_x1:   HOST_LOGMASS

# We assume BoxUniform priors for our parameters; 
# so each tuple needs to include the lower and upper bound you expect for that parameter. 
# Gaussians are formatted as mu then sigma

Priors:
    SIM_c:    ['(-.1, 0)', '(0.02, 0.1)']
    SIM_EBV:  ['(0.05, 0.5)']
    SIM_beta: ['(1.5,3)', '(0.05, 0.3)']
    SIM_x1:   ['(-2,2)', '(0.2, 1)']
    SIM_x1_EVOL: ['(-0.2,0.2)']
    STEP:     ['(-0.2,0.2)']
    SCATTER:  ['(0,0.1)']
    SIM_RV:   ['(1.5,4)', '(0.5,2)']
#    SIM_RV:   ['(1,3)','(-1.5, 2.1)', '(0,.5)'] #L, k, sigma



# Fancy latex labels for plotting. Add as you see fit. 
Latex_Names:
    DistExponential:   ['$\tau$']
    DistGaussian:      ['$\mu$', '$\sigma$']
    DistGaussian_EVOL: ['$\mu$', '$\sigma$', '$\mu slope$']
    SIM_c:             '$c_{int}$'
    SIM_beta:          '$\beta_{int}$'
    SIM_RV:            '$R_V$'
    SIM_EBV:           '$EBV$'
    SIM_x1:            '$x_1$'
    STEP:              '$\gamma$'
    SCATTER:           '$\sigma_{int}$'
    DistLogistic:      ['$L$', '$k$', '$\sigma$']
