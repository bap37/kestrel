param_names:
    SIM_c
    SIM_RV
    SIM_x1
    SIM_EBV
    STEP

parameters_to_condition_on:
    ['c', 'mB', 'x1', 'zHD', 'cERR', 'mBERR', 'x1ERR', 'MU', 'HOST_LOGMASS', 'MURES']

sim_parameters:
    n_sim:   500
    n_batch: 500
    simname: 'garb.h5'
    posteriorname: 'posterior.v3.pt'

#########################
# Dictionaries 
#########################

Boundaries:
    SIM_c:    (-0.5,0.5) #A tuple containing the lower and upper bounds
    SIM_RV:   (1.5, 5)
    SIM_EBV:  (0,1)
    SIM_beta: (0.5,4)
    SIM_x1:   (-5, 5)

Functions:
    SIM_c:    DistGaussian  #The shape of this parameter.
    SIM_RV:   DistGaussian
    SIM_EBV:  DistExponential
    SIM_beta: DistGaussian
    SIM_x1:   DistGaussian


Splits:
    SIM_RV:  ["Stepwise","HOST_LOGMASS", 10] #A list containing the split parameter and location
    SIM_EBV: ["Stepwise","HOST_LOGMASS", 10]
    STEP:    ["Stepwise", "HOST_LOGMASS", 10]


# We assume BoxUniform priors for our parameters; 
# so each tuple needs to include the lower and upper bound you expect for that parameter. 
# Gaussians are formatted as mu then sigma

Priors:
    SIM_c:    ["(-.1, 0)", "(0.02, 0.1)"]
    SIM_RV:   ["(1.5,4)", "(0.5,2)"]
    SIM_EBV:  ["(0.05, 0.5)"]
    SIM_beta: ["(1,2)", "(0.05, 0.3)"]
    SIM_x1:   ["(-2,2)", "(0.2, 1)"]
    STEP:     ["(0,0.2)"]



# Fancy latex labels for plotting. Add as you see fit. 
Latex_Names:
    DistExponential:  [r'$\tau$']
    DistGaussian:     [r'$\mu$', r'$\sigma$']
    SIM_c:            r"$c_{\rm int}$"
    SIM_beta:         r"$\beta_{\rm int}$"
    SIM_RV:           r"$R_V$"
    SIM_EBV:          r"$EBV$"
    SIM_x1:           r"$x_1$"


